<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benimle Çıkar Mısın?</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.container {
    text-align: center;
    z-index: 2;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
    animation: fadeIn 2s ease;
}

p {
    font-size: 18px;
    opacity: 0.8;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    margin: 15px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#yes {
    background: linear-gradient(45deg, #00ffcc, #00ff88);
    color: black;
    box-shadow: 0 0 20px rgba(0,255,200,0.5);
}

#yes:hover {
    transform: scale(1.1);
}

#no {
    background: linear-gradient(45deg, #ff4d4d, #ff0000);
    color: white;
    position: absolute;
}

.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s infinite;
}

.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}

.heart::before {
    top: -10px;
    left: 0;
}

.heart::after {
    left: -10px;
    top: 0;
}

@keyframes float {
    0% { transform: translateY(0) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-800px) rotate(45deg); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.final {
    font-size: 40px;
    animation: fadeIn 2s ease;
}

</style>
</head>

<body>

<div class="container" id="main">
    <h1>Benimle çıkar mısın? ❤️</h1>
    <p>Bu site sadece senin için yapıldı...</p>

    <button id="yes">Evet 💖</button>
    <button id="no">Hayır 💔</button>
</div>

<script>
// Kaçan buton
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * 80 + "%";
    noBtn.style.left = Math.random() * 80 + "%";
});

// Evet tıklanınca
const yesBtn = document.getElementById("yes");
yesBtn.onclick = () => {
    document.body.innerHTML = `
        <div class="final">Seni seviyorum ❤️<br><br>Artık resmen birliktesin 😌</div>
    `;
    startHearts();
};

// Kalp yağmuru
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

function startHearts() {
    setInterval(createHeart, 200);
}
</script>

</body>
</html>
