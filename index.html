<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benimle Çıkar Mısın?</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.container {
    text-align: center;
    z-index: 2;
}

h1 {
    font-size: 52px;
    margin-bottom: 10px;
    animation: fadeIn 2s ease;
}

p {
    font-size: 20px;
    opacity: 0.85;
}

button {
    padding: 15px 35px;
    font-size: 18px;
    margin: 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#yes {
    background: linear-gradient(45deg, #00ffcc, #00ff88);
    color: black;
    box-shadow: 0 0 25px rgba(0,255,200,0.7);
}

#yes:hover {
    transform: scale(1.15);
}

#no {
    background: linear-gradient(45deg, #ff4d4d, #ff0000);
    color: white;
    position: absolute;
}

.gif {
    width: 180px;
    border-radius: 15px;
    margin-bottom: 15px;
}

.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s infinite;
}

.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -10px; }
.heart::after { left: -10px; }

@keyframes float {
    0% { transform: translateY(0) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-900px) rotate(45deg); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.final {
    font-size: 42px;
    text-align: center;
}

</style>
</head>

<body>

<!-- MÜZİK -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="container" id="main">

    <!-- GİF -->
    <img class="gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

    <h1>Benimle çıkar mısın? ❤️</h1>
    <p>Bu site sadece senin için yapıldı... ve evet demen için tasarlandı 😌</p>

    <button id="yes">Evet 💖</button>
    <button id="no">Hayır 💔</button>
</div>

<script>
const noBtn = document.getElementById("no");
let scale = 1;

// Kaçan + küçülen hayır butonu
noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * 80 + "%";
    noBtn.style.left = Math.random() * 80 + "%";

    scale -= 0.1;
    if(scale > 0.3){
        noBtn.style.transform = `scale(${scale})`;
    }
});

// EVET BUTONU
const yesBtn = document.getElementById("yes");
yesBtn.onclick = () => {
    document.body.innerHTML = `
        <div class="final">
        <img class="gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"><br>
        SENİ SEVİYORUM ❤️<br><br>
        Artık resmen birliktesin 😌
        </div>
    `;
    startHearts();
};

// Kalp yağmuru
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

function startHearts() {
    setInterval(createHeart, 150);
}
</script>

</body>
</html>
