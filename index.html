<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meryem ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a0000,#2b0000,#000);
font-family:Arial;
color:white;
overflow:hidden;
text-align:center;
}

/* container */
.container{
width:90%;
max-width:400px;
padding:30px;
border-radius:20px;
background:rgba(255,0,50,0.1);
backdrop-filter:blur(15px);
box-shadow:0 0 40px red;
}

/* text */
h1{font-size:20px;}
h2{font-size:18px; margin-top:10px;}

/* buttons */
.buttons{
margin-top:30px;
position:relative;
height:120px;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
position:absolute;
transition:0.2s;
}

/* YES (büyüyen) */
.yes{
left:15%;
background:#ff0033;
color:white;
box-shadow:0 0 20px red;
transform:scale(1);
}

/* NO (kaçan + kilitli) */
.no{
right:15%;
background:#220000;
color:white;
cursor:not-allowed;
opacity:0.8;
}

/* RESULT */
.result{
display:none;
margin-top:20px;
}

.result img{
width:80%;
margin-top:20px;
border-radius:15px;
}

/* HEART */
.heart{
position:fixed;
font-size:20px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{transform:translateY(100vh); opacity:1;}
to{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
<h1>Sana bir şey sormak istiyorum...</h1>
<h2>Benimle çıkar mısın? ❤️</h2>

<div class="buttons">
<button class="yes" id="yesBtn" onclick="acceptLove()">Evet ❤️</button>
<button class="no" id="noBtn" disabled>Hayır</button>
</div>

<div class="result" id="result">
<h2>Dünyanın en mutlu insanıyım ❤️</h2>
<img src="ask.gif">
</div>
</div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_0c6b9b23c5.mp3?filename=romantic-piano-ambient-11031.mp3">
</audio>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let scale = 1;

/* hayır kaçınca evet büyür */
function moveButton(){
    noBtn.style.top = Math.random()*200 + "px";
    noBtn.style.left = Math.random()*200 + "px";

    scale += 0.15;
    yesBtn.style.transform = "scale(" + scale + ")";
}

/* mouse yaklaşınca */
document.addEventListener("mousemove",(e)=>{
    const rect = noBtn.getBoundingClientRect();

    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distance < 120){
        moveButton();
    }
});

/* mobil */
noBtn.addEventListener("touchstart",moveButton);

/* kalp efekti */
function createHeart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*2+3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

/* evet */
function acceptLove(){
document.querySelector(".buttons").style.display="none";
document.getElementById("result").style.display="block";

/* müzik */
const music=document.getElementById("music");
music.play();

/* kalpler */
for(let i=0;i<50;i++){
setTimeout(createHeart,i*60);
}
}

</script>

</body>
</html>
