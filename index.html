<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>?</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #ff1a1a, #8b0000, #2b0000);
    font-family: 'Segoe UI', sans-serif;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('/mnt/data/72688184-0a38-44cb-993e-c4e0e4f81390.png') center/cover no-repeat;
    opacity: 0.15;
    filter: blur(3px);
}

.container {
    text-align: center;
    z-index: 2;
}

.buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
}

button {
    padding: 18px 40px;
    font-size: 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#yes {
    background: linear-gradient(45deg, #ff4d6d, #ff1a1a);
    color: white;
    box-shadow: 0 0 25px rgba(255,0,0,0.7);
}

#yes:hover {
    transform: scale(1.2);
}

#no {
    background: #111;
    color: white;
    position: relative;
}

.final {
    font-size: 45px;
    color: white;
    text-align: center;
}

.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s infinite;
}

.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -10px; }
.heart::after { left: -10px; }

@keyframes float {
    0% { transform: translateY(0) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-900px) rotate(45deg); opacity: 0; }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <div class="buttons">
        <button id="yes">Evet ❤️</button>
        <button id="no">Hayır 💔</button>
    </div>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.top = Math.random() * 80 + "%";
    noBtn.style.left = Math.random() * 80 + "%";
});

const yesBtn = document.getElementById("yes");
yesBtn.onclick = () => {
    document.body.innerHTML = `
        <div class="final">❤️</div>
    `;
    startHearts();
};

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

function startHearts() {
    setInterval(createHeart, 150);
}
</script>

</body>
</html>
