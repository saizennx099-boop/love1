<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gülperin ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* BACKGROUND STARS */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0.25;
animation:move 60s linear infinite;
}
@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* INTRO */
#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
animation:fadeOut 5s forwards;
animation-delay:4s;
}

.name{
font-size:38px;
font-weight:800;
color:#ff0033;
text-shadow:0 0 30px #ff0033;
animation:heartbeat 1.3s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.1);}
50%{transform:scale(1);}
75%{transform:scale(1.15);}
100%{transform:scale(1);}
}

@keyframes fadeOut{
to{opacity:0; visibility:hidden;}
}

/* MAIN */
.container{
display:none;
width:90%;
max-width:420px;
padding:35px;
border-radius:25px;
background:rgba(255,0,50,0.08);
backdrop-filter:blur(20px);
box-shadow:0 0 50px rgba(255,0,50,0.4);
animation:zoomIn 1.5s ease forwards;
}

@keyframes zoomIn{
from{opacity:0; transform:scale(0.7);}
to{opacity:1; transform:scale(1);}
}

h1{
font-size:20px;
opacity:0;
animation:fadeText 2s forwards;
animation-delay:1s;
}

h2{
font-size:18px;
margin-top:15px;
opacity:0;
animation:fadeText 2s forwards;
animation-delay:2.2s;
}

@keyframes fadeText{
to{opacity:1;}
}

/* BUTTONS */
.buttons{
margin-top:30px;
position:relative;
height:80px;
opacity:0;
animation:fadeText 2s forwards;
animation-delay:3.5s;
}

button{
width:120px;
padding:12px;
border:none;
border-radius:30px;
font-size:15px;
cursor:pointer;
position:absolute;
}

.yes{
left:15%;
background:linear-gradient(45deg,#ff0033,#990000);
color:white;
box-shadow:0 0 20px #ff0033;
}

.no{
right:15%;
background:#220000;
color:white;
}

/* RESULT */
.result{
display:none;
margin-top:20px;
animation:fadeIn 2s forwards;
}

.result img{
width:80%;
max-width:260px;
margin-top:20px;
border-radius:15px;
box-shadow:0 0 40px red;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* HEARTS */
.heart{
position:fixed;
font-size:20px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{transform:translateY(100vh); opacity:1;}
to{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div>Bu site sadece</div>
<div class="name">❤️ Meryem ❤️</div>
<div>için yapıldı...</div>
</div>

<!-- MAIN -->
<div class="container" id="main">
<h1>Sana bir şey sormak istiyorum...</h1>
<h2>Benimle çıkar mısın? ❤️</h2>

<div class="buttons">
<button class="yes" onclick="acceptLove()">Evet ❤️</button>
<button class="no" id="noBtn">Hayır</button>
</div>

<div class="result" id="result">
<h2>Dünyanın en mutlu insanıyım ❤️</h2>
<img src="ask.gif">
</div>
</div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_0c6b9b23c5.mp3?filename=romantic-piano-ambient-11031.mp3">
</audio>

<script>

/* intro sonrası */
setTimeout(()=>{
document.getElementById("main").style.display="block";
},5000);

/* hayır kaçma */
const noBtn=document.getElementById("noBtn");
function moveButton(){
noBtn.style.top=Math.random()*300+"px";
noBtn.style.left=Math.random()*200+"px";
}
noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);

/* kalpler */
function createHeart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*2+3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}

/* evet */
function acceptLove(){
window.location.href = "not.html";
document.querySelector(".buttons").style.display="none";
document.getElementById("result").style.display="block";

/* müzik yumuşak başlasın */
const music=document.getElementById("music");
music.volume=0;
music.play();

let v=0;
let fade=setInterval(()=>{
if(v<1){
v+=0.05;
music.volume=v;
}else{
clearInterval(fade);
}
},200);

/* kalp patlaması */
for(let i=0;i<60;i++){
setTimeout(createHeart,i*50);
}
}
</script>

</body>
</html>
